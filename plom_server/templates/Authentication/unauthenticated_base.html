<!-- an outer wrapping for pages shown to unauthenticated users -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>
            {% block full_title %}
            {% endblock full_title %}
        </title>
        <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
        <link href="{% static 'css3rdparty/bootstrap.min.css' %}" rel="stylesheet" />
        <link href="{% static 'css3rdparty/bootstrap-icons.css' %}"
              rel="stylesheet" />
        <!-- Adjusts bootstrap styling to light-mode or dark-mode -->
        <script type="module" src="{% static '/js/bootstrap_lightdark_mode.js' %}"></script>
        <script type="module" src="{% static '/js/frontend_utils.js' %}"></script>
    </head>
    <body>
        <nav class="navbar">
            <div class="navbar-brand" style="margin-left: 5px">
                {% include "base/plom_logo.html" with width="276px" height="93px" %}
            </div>
        </nav>
        {% block main_content %}
        {% endblock main_content %}
    </body>
</html>
