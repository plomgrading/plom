{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Plom - Login</title>
        <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
        <link href="{% static 'css3rdparty/bootstrap.min.css' %}" rel="stylesheet" />
        <script src="{% static 'js3rdparty/bootstrap.bundle.min.js' %}"></script>
        <!-- Bootstrap icons -->
        <link href="{% static 'css3rdparty/bootstrap-icons.css' %}"
              rel="stylesheet" />
        <link rel="stylesheet" href="{% static 'css/base.css' %}">
        <!-- Adjusts bootstrap styling to light-mode or dark-mode -->
        <script type="module" src="{% static '/js/bootstrap_lightdark_mode.js' %}"></script>
        <script type="module" src="{% static '/js/frontend_utils.js' %}"></script>
    </head>
    <body class="bg-branded-plom">
        <div class="container py-5">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card rounded-4">
                        <div class="card-body p-5 text-center mt-4 mb-5">
                            {% include "base/plom_logo.html" with width="276px" height="93px" max_width="unset" %}
                            <p class="fw-light mb-5">v{{ plom_version }}</p>
                            <form method="post" action="">
                                {% csrf_token %}
                                <div class="form-floating mb-4">
                                    <input type="text"
                                           class="form-control form-control-lg border border-secondary bg-transparent rounded-1"
                                           name="username"
                                           placeholder="Username" />
                                    <label class="form-label">Username</label>
                                </div>
                                <div class="form-floating input-group mb-4">
                                    <input type="password"
                                           id="passwordInput"
                                           class="form-control form-control-lg border border-secondary bg-transparent rounded-start-1"
                                           name="password"
                                           placeholder="Password" />
                                    <button type="button"
                                            class="btn btn-outline-secondary rounded-end-1"
                                            onclick="toggleVisibility('passwordInput')">
                                        <i class="fs-4 bi bi-eye"></i>
                                    </button>
                                    <label class="form-label" for="passwordInput">Password</label>
                                </div>
                                <div class="medium mb-5 pb-lg-2">
                                    <input id="remember"
                                           name="remember_me"
                                           class="text-black-100"
                                           type="checkbox">
                                    <label class="form-label" for="remember">Remember me</label>
                                </div>
                                {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}">{% endif %}
                                <button class="btn btn-lg btn-plom-purple text-centre focus-ring"
                                        type="submit">
                                    <span class="m-5"><span class="bi-box-arrow-in-right"></span>
                                    Login</span>
                                </button>
                            </form>
                            <br />
                            {% if error %}<div class="alert alert-info">{{ error }}</div>{% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
