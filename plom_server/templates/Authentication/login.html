{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Plom - Login</title>
        <!-- Bootstrap stylesheet -->
        <link href="{% static 'css3rdparty/bootstrap.min.css' %}" rel="stylesheet" />
        <script src="{% static 'js3rdparty/bootstrap.bundle.min.js' %}"></script>
        <!-- Bootstrap icons -->
        <link href="{% static 'css3rdparty/bootstrap-icons.css' %}"
              rel="stylesheet" />
        <link rel="stylesheet" href="{% static 'css/base.css' %}">
        <link rel="stylesheet"
              type="text/css"
              href="{% static '/css/loginPage.css' %}">
    </head>
    <body class="bg-plom-light-purple">
        <div class="container py-5">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card bg-plom-off-white rounded-4">
                        <div class="card-body p-5 text-center mt-4 mb-5">
                            <img src="{% static 'plomLogo.png' %}"
                                 alt="Plom logo"
                                 width="276px"
                                 height="93px" />
                            <p class="fw-light mb-5">v{{ plom_version }}</p>
                            <h3 class="fw-bold mt-5 mb-2">LOGIN</h3>
                            <p class="mb-5">Please enter your login and password!</p>
                            <form method="post" action="">
                                {% csrf_token %}
                                <div class="form-floating mb-4">
                                    <input type="text"
                                           class="form-control form-control-lg border border-secondary bg-transparent rounded-1"
                                           name="username"
                                           placeholder="Username" />
                                    <label class="form-label">Username</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="password"
                                           id="typePasswordX"
                                           class="form-control form-control-lg border border-secondary bg-transparent rounded-1"
                                           name="password"
                                           placeholder="Password" />
                                    <label class="form-label" for="typePasswordX">Password</label>
                                </div>
                                <div class="medium mb-5 pb-lg-2">
                                    <input id="check-password" class="text-black-100" type="checkbox">
                                    <label class="form-label" for="check-password">Show Password</label>
                                </div>
                                {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}">{% endif %}
                                <button class="btn btn-lg fw-light text-centre border border-dark border-2 bg-plom-purple"
                                        type="submit">
                                    <span class="m-5"><span class="bi-box-arrow-in-right"></span>
                                LOGIN</span>
                            </button>
                        </form>
                        <br />
                        {% include "../base/alert_messages.html" with messages=messages %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="module" src="{% static '/js/frontend_utils.js' %}"></script>
</html>
