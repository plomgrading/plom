{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Plom - Set Password Complete</title>
        <link href="{% static 'css3rdparty/bootstrap.min.css' %}" rel="stylesheet" />
        <!-- Adjusts bootstrap styling to light-mode or dark-mode -->
        <script type="module" src="{% static '/js/bootstrap_lightdark_mode.js' %}"></script>
    </head>
    <body>
        <nav class="navbar">
            <div class="navbar-brand" style="margin-left: 5px">
                {% include "base/plom_logo.html" with width="276px" height="93px" %}
            </div>
        </nav>
        <div class="container">
            <div class="card m-4 p-4 bg-primary-subtle">
                <h2>Password Set Complete</h2>
                <p>Your password has been set. Click on login to log in now.</p>
                <span>
                    <a class="btn btn-primary" href="{% url 'login' %}">Go to login page</a>
                </span>
            </div>
        </div>
    </body>
</html>
