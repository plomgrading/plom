<!-- linebreaksbr converts \n to <br /> -->
{% if 'success' in message.tags %}
    <div class="alert alert-success">{{ message|linebreaksbr }}</div>
{% elif 'warning' in message.tags %}
    <div class="alert alert-warning">{{ message|linebreaksbr }}</div>
{% elif 'error' in message.tags %}
    <div class="alert alert-danger">{{ message|linebreaksbr }}</div>
{% elif 'info' in message.tags %}
    <div class="alert alert-info">{{ message|linebreaksbr }}</div>
{% else %}
    <div class="alert alert-secondary">{{ message|linebreaksbr }}</div>
{% endif %}
