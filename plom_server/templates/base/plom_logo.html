{% load static %}
<picture id="plomLogo">
    <!-- User prefers light mode: -->
    <source srcset="{% static 'plomLogo.png' %}"
            media="(prefers-color-scheme: light)"
            alt="Plom logo" />
    <!-- User prefers dark mode: -->
    <source srcset="{% static 'plomLogo_dark.png' %}"
            media="(prefers-color-scheme: dark)"
            alt="Plom logo" />
    <!-- User has no color preference: -->
    <img srcset="{% static 'plomLogo.png' %}"
         alt="Plom logo"
         style="width:{{ width }};
                height:{{ height }};
                max-width:{{ max_width }}" />
</picture>
